<div class="w-full max-w-md bg-[#1a1a1a] rounded-2xl shadow-xl p-8 font-Pretendard">

  <div id="userInfo" class="hidden">

    <div class="bg-[#252525] rounded-xl p-6 mb-6 space-y-4">

        <p class="text-highlight text-sm mb-1"><span class="tossface">👤</span> 닉네임</p>

      <div>
        <p class="text-highlight text-sm mb-1"><span class="tossface">🔒</span> 로그인 시간</p>
        <p id="loginTime" class="text-gray-500 text-sm font-semibold"></p>
      </div>
    </div>

    <div class="bg-[#252525] rounded-xl p-6 mb-6">
      <div class="flex items-center justify-between">
        <div class="flex-1">

          <p class="text-xs text-gray-500">이벤트 및 프로모션 알림</p>

    </div>

    <div class="space-y-3">

        정보 새로고침
      </button>
      <button id="logoutBtn" class="w-full py-3 rounded-xl bg-gray-600 hover:bg-gray-500 text-white font-semibold transition">
        로그아웃
